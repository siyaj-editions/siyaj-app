name: Deploy Preprod VPS

on:
  push:
    branches:
      - preprod
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      PREPROD_APP_PATH: ${{ format('{0}-preprod', secrets.VPS_APP_PATH) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase)
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:preprod-latest

      - name: Prepare preprod folders on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            test -n "${{ env.PREPROD_APP_PATH }}" || { echo "PREPROD_APP_PATH manquant"; exit 1; }
            mkdir -p "${{ env.PREPROD_APP_PATH }}"
            mkdir -p "${{ env.PREPROD_APP_PATH }}/shared/uploads/books"
            mkdir -p "${{ env.PREPROD_APP_PATH }}/shared/uploads/manuscripts"

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "compose.preprod.yml,deploy/nginx/default.conf"
          target: ${{ env.PREPROD_APP_PATH }}
          strip_components: 0

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.PREPROD_APP_PATH }}
            test -f .env.preprod || { echo ".env.preprod introuvable dans $PWD"; exit 1; }

            export APP_IMAGE=${{ env.IMAGE_NAME }}:${{ github.sha }}

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker pull $APP_IMAGE
            docker compose --env-file .env.preprod -f compose.preprod.yml up -d database

            docker compose --env-file .env.preprod -f compose.preprod.yml run --rm app php bin/console doctrine:migrations:migrate --no-interaction
            docker compose --env-file .env.preprod -f compose.preprod.yml run --rm app php bin/console cache:clear --env=prod

            docker compose --env-file .env.preprod -f compose.preprod.yml up -d app
            docker compose --env-file .env.preprod -f compose.preprod.yml exec -T app sh -lc 'mkdir -p /var/www/html/public /var/www/html/public/uploads && find /var/www/html/public -mindepth 1 -maxdepth 1 ! -name uploads -exec rm -rf {} + && cp -a /opt/public/. /var/www/html/public/'
            docker compose --env-file .env.preprod -f compose.preprod.yml up -d nginx
            docker logout ghcr.io
            docker image prune -f
