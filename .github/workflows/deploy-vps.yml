name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase)
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "compose.vps.yml,deploy/nginx/default.conf"
          target: ${{ secrets.VPS_APP_PATH }}
          strip_components: 0

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_PATH }}
            test -f .env.prod || { echo ".env.prod introuvable dans $PWD"; exit 1; }

            export APP_IMAGE=${{ env.IMAGE_NAME }}:${{ github.sha }}

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker pull $APP_IMAGE
            docker compose --env-file .env.prod -f compose.vps.yml up -d database

            docker compose --env-file .env.prod -f compose.vps.yml run --rm app php bin/console doctrine:migrations:migrate --no-interaction
            docker compose --env-file .env.prod -f compose.vps.yml run --rm app php bin/console cache:clear --env=prod

            docker compose --env-file .env.prod -f compose.vps.yml up -d app
            docker compose --env-file .env.prod -f compose.vps.yml exec -T app sh -lc 'mkdir -p /var/www/html/public && cp -an /opt/public/. /var/www/html/public/'
            docker compose --env-file .env.prod -f compose.vps.yml exec -T app php bin/console importmap:install --env=prod
            docker compose --env-file .env.prod -f compose.vps.yml exec -T app php bin/console tailwind:build --env=prod --minify
            docker compose --env-file .env.prod -f compose.vps.yml exec -T app php bin/console asset-map:compile --env=prod
            docker compose --env-file .env.prod -f compose.vps.yml up -d nginx
            docker logout ghcr.io
            docker image prune -f
