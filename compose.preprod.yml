name: siyaj-preprod

services:
  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    env_file:
      - .env.preprod
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - public_data:/var/www/html/public
      - /home/ubuntu/siyaj-preprod/shared/uploads/books:/var/www/html/public/uploads/books
      - /home/ubuntu/siyaj-preprod/shared/uploads/manuscripts:/var/www/html/var/uploads/manuscripts

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${HOST_HTTP_PORT:-8003}:80"
    volumes:
      - public_data:/usr/share/nginx/html:ro
      - /home/ubuntu/siyaj-preprod/shared/uploads/books:/usr/share/nginx/html/uploads/books:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  public_data:
